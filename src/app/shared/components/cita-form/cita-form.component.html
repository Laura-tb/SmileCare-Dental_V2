<!-- 
  Si el formulario es inválido y ya ha sido modificado (dirty),
  mostramos un aviso general.
-->
@if (formGroup.invalid && formGroup.dirty) {
<div class="form-error-alert">
    ⚠️ Revisa los campos marcados en rojo.
</div>
}

<!-- 
  Si el validador global detecta fecha/hora pasada,
  mostramos un error específico.
-->
@if (formGroup.errors?.['pastDateTime']) {
<div class="form-error-alert">
    ⚠️ No puedes seleccionar una fecha y hora pasada.
</div>
}

<!-- 
  Formulario reactivo:
  - Se vincula al formGroup recibido por Input.
  - Al enviarse ejecuta onSubmit().
-->
<form [formGroup]="formGroup" (ngSubmit)="onSubmit()">

    <label>
        <span>Fecha</span>
        <input type="date" formControlName="date"
            [class.error]="formGroup.controls['date'].invalid && formGroup.controls['date'].touched" />

        @if (getErrorMessage('date')) {
        <small class="error-msg">{{ getErrorMessage('date') }}</small>
        }
    </label>

    <label>
        <span>Hora</span>
        <input type="time" formControlName="time"
            [class.error]="formGroup.controls['time'].invalid && formGroup.controls['time'].touched" />

        @if (getErrorMessage('time')) {
        <small class="error-msg">{{ getErrorMessage('time') }}</small>
        }
    </label>

    <label>
        <span>Nombre</span>
        <input type="text" formControlName="firstName"
            [class.error]="formGroup.controls['firstName'].invalid && formGroup.controls['firstName'].touched" />

        @if (getErrorMessage('firstName')) {
        <small class="error-msg" aria-live="polite">
            {{ getErrorMessage('firstName') }}
        </small>
        }
    </label>

    <label>
        <span>Apellidos</span>
        <input type="text" formControlName="lastName"
            [class.error]="formGroup.controls['lastName'].invalid && formGroup.controls['lastName'].touched" />

        @if (getErrorMessage('lastName')) {
        <small class="error-msg">{{ getErrorMessage('lastName') }}</small>
        }

    </label>

    <label>
        <span>DNI o NIE</span>
        <input type="text" formControlName="dni"
            [class.error]="formGroup.controls['dni'].invalid && formGroup.controls['dni'].touched" />

        @if (getErrorMessage('dni')) {
        <small class="error-msg">{{ getErrorMessage('dni') }}</small>
        }
    </label>

    <label>
        <span>Teléfono</span>
        <input type="tel" formControlName="phone"
            [class.error]="formGroup.controls['phone'].invalid && formGroup.controls['phone'].touched" />

        @if (getErrorMessage('phone')) {
        <small class="error-msg">{{ getErrorMessage('phone') }}</small>
        }
    </label>

    <label>
        <span>Email</span>
        <input type="email" formControlName="email"
            [class.error]="formGroup.controls['email'].invalid && formGroup.controls['email'].touched" />

        @if (getErrorMessage('email')) {
        <small class="error-msg">{{ getErrorMessage('email') }}</small>
        }
    </label>

    <label>
        <span>Fecha de Nacimiento</span>
        <input type="date" formControlName="birthDate"
            [class.error]="formGroup.controls['birthDate'].invalid && formGroup.controls['birthDate'].touched" />

        @if (getErrorMessage('birthDate')) {
        <small class="error-msg">{{ getErrorMessage('birthDate') }}</small>
        }
    </label>

    <label>
        <span>Observaciones</span>
        <textarea formControlName="notes"
            [class.error]="formGroup.controls['notes'].invalid && formGroup.controls['notes'].touched">
                    </textarea>

        @if (getErrorMessage('notes')) {
        <small class="error-msg">{{ getErrorMessage('notes') }}</small>
        }
    </label>

    <!-- 
      Campo oculto.
      Se utiliza para mantener referencia interna
      cuando estamos editando una cita.
    -->
    <input type="hidden" id="editingId" />

    <!-- BOTONES DE ACCIÓN -->
    <div class="button-create">
        <button type="reset">Limpiar</button>

        <!-- Envía el formulario -->
        <button type="submit" class="button-save-blue">
            <span class="material-symbols-outlined">calendar_add_on</span>
            {{ submitLabel }}
        </button>
    </div>

</form>
